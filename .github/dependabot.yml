version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Shanghai"
    labels:
      - "dependencies"
      - "ci"

  - package-ecosystem: "maven"
    directory: "/backend"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:10"
      timezone: "Asia/Shanghai"
    labels:
      - "dependencies"
      - "backend"

  - package-ecosystem: "uv"
    directory: "/ai-service"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:20"
      timezone: "Asia/Shanghai"
    labels:
      - "dependencies"
      - "ai-service"

  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:30"
      timezone: "Asia/Shanghai"
    labels:
      - "dependencies"
      - "frontend"

  - package-ecosystem: "npm"
    directory: "/docs/design"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:40"
      timezone: "Asia/Shanghai"
    labels:
      - "dependencies"
      - "design"

  - package-ecosystem: "docker"
    directory: "/backend"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:50"
      timezone: "Asia/Shanghai"
    labels:
      - "dependencies"
      - "backend"
      - "docker"

  - package-ecosystem: "docker"
    directory: "/ai-service"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "10:00"
      timezone: "Asia/Shanghai"
    labels:
      - "dependencies"
      - "ai-service"
      - "docker"
