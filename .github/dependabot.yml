version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    open-pull-requests-limit: 1
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Shanghai"
    groups:
      github-actions:
        patterns:
          - "*"
    labels:
      - "dependencies"
      - "ci"

  - package-ecosystem: "maven"
    directory: "/backend"
    open-pull-requests-limit: 2
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:10"
      timezone: "Asia/Shanghai"
    groups:
      backend-maven-minor-patch:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
    ignore:
      - dependency-name: "*"
        update-types:
          - "version-update:semver-major"
    labels:
      - "dependencies"
      - "backend"

  - package-ecosystem: "uv"
    directory: "/ai-service"
    open-pull-requests-limit: 2
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:20"
      timezone: "Asia/Shanghai"
    groups:
      ai-service-python-minor-patch:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
    ignore:
      - dependency-name: "*"
        update-types:
          - "version-update:semver-major"
    labels:
      - "dependencies"
      - "ai-service"

  - package-ecosystem: "npm"
    directory: "/frontend"
    open-pull-requests-limit: 2
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:30"
      timezone: "Asia/Shanghai"
    groups:
      frontend-npm-minor-patch:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
    ignore:
      - dependency-name: "*"
        update-types:
          - "version-update:semver-major"
    labels:
      - "dependencies"
      - "frontend"

  - package-ecosystem: "npm"
    directory: "/docs/design"
    open-pull-requests-limit: 0
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:40"
      timezone: "Asia/Shanghai"
    labels:
      - "dependencies"
      - "design"

  - package-ecosystem: "docker"
    directory: "/backend"
    open-pull-requests-limit: 1
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:50"
      timezone: "Asia/Shanghai"
    ignore:
      - dependency-name: "eclipse-temurin"
        versions:
          - "25*"
      - dependency-name: "maven"
        versions:
          - "*-eclipse-temurin-25"
    labels:
      - "dependencies"
      - "backend"
      - "docker"

  - package-ecosystem: "docker"
    directory: "/ai-service"
    open-pull-requests-limit: 1
    schedule:
      interval: "weekly"
      day: "monday"
      time: "10:00"
      timezone: "Asia/Shanghai"
    labels:
      - "dependencies"
      - "ai-service"
      - "docker"
