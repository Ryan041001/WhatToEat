version: 2
updates:
  # GitHub Actions — 全部合并为一个 PR
  - package-ecosystem: "github-actions"
    directory: "/"
    open-pull-requests-limit: 1
    schedule:
      interval: "monthly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Shanghai"
    groups:
      github-actions:
        patterns:
          - "*"
    labels:
      - "dependencies"
      - "ci"

  # 后端 Maven 依赖 — minor/patch 合并，忽略 major
  - package-ecosystem: "maven"
    directory: "/backend"
    open-pull-requests-limit: 1
    schedule:
      interval: "monthly"
      day: "monday"
      time: "09:10"
      timezone: "Asia/Shanghai"
    groups:
      backend-maven:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
    ignore:
      - dependency-name: "*"
        update-types:
          - "version-update:semver-major"
    labels:
      - "dependencies"
      - "backend"

  # AI Service Python 依赖 — minor/patch 合并，忽略 major
  - package-ecosystem: "uv"
    directory: "/ai-service"
    open-pull-requests-limit: 1
    schedule:
      interval: "monthly"
      day: "monday"
      time: "09:20"
      timezone: "Asia/Shanghai"
    groups:
      ai-service-python:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
    ignore:
      - dependency-name: "*"
        update-types:
          - "version-update:semver-major"
    labels:
      - "dependencies"
      - "ai-service"

  # 前端 npm 依赖 — minor/patch 合并，忽略 major
  - package-ecosystem: "npm"
    directory: "/frontend"
    open-pull-requests-limit: 1
    schedule:
      interval: "monthly"
      day: "monday"
      time: "09:30"
      timezone: "Asia/Shanghai"
    groups:
      frontend-npm:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
    ignore:
      - dependency-name: "*"
        update-types:
          - "version-update:semver-major"
    labels:
      - "dependencies"
      - "frontend"

  # 设计文档 npm 依赖 — 暂时完全禁用，不生成 PR
  - package-ecosystem: "npm"
    directory: "/docs/design"
    open-pull-requests-limit: 0
    schedule:
      interval: "monthly"
      day: "monday"
      time: "09:40"
      timezone: "Asia/Shanghai"
    groups:
      design-npm:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
    ignore:
      - dependency-name: "*"
        update-types:
          - "version-update:semver-major"
    labels:
      - "dependencies"
      - "design"

  # 后端 Docker 基础镜像 — 合并为一个 PR
  - package-ecosystem: "docker"
    directory: "/backend"
    open-pull-requests-limit: 1
    schedule:
      interval: "monthly"
      day: "monday"
      time: "09:50"
      timezone: "Asia/Shanghai"
    groups:
      backend-docker:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
    ignore:
      - dependency-name: "eclipse-temurin"
        versions:
          - "25*"
      - dependency-name: "maven"
        versions:
          - "*-eclipse-temurin-25"
      - dependency-name: "*"
        update-types:
          - "version-update:semver-major"
    labels:
      - "dependencies"
      - "backend"
      - "docker"

  # AI Service Docker 基础镜像
  - package-ecosystem: "docker"
    directory: "/ai-service"
    open-pull-requests-limit: 1
    schedule:
      interval: "monthly"
      day: "monday"
      time: "10:00"
      timezone: "Asia/Shanghai"
    groups:
      ai-service-docker:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
    ignore:
      - dependency-name: "*"
        update-types:
          - "version-update:semver-major"
    labels:
      - "dependencies"
      - "ai-service"
      - "docker"
