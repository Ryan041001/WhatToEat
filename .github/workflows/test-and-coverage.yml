name: Test And Coverage

on:
  push:
    branches:
      - main
      - feat/**
  pull_request:

jobs:
  backend-test-and-coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Run backend tests with JaCoCo report
        working-directory: backend
        run: ./mvnw test jacoco:report

      - name: Upload backend coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: backend/target/site/jacoco/jacoco.xml
          flags: backend
          name: backend
          fail_ci_if_error: false

  backend-package:
    runs-on: ubuntu-latest
    needs: backend-test-and-coverage
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Build backend package
        working-directory: backend
        run: ./mvnw -DskipTests package

  ai-service:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: pip install uv

      - name: Run ai-service tests with coverage
        working-directory: ai-service
        run: uv run --with pytest --with pytest-cov pytest --cov=app --cov-report=xml:coverage.xml --cov-report=term-missing -q

      - name: Upload ai-service coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: ai-service/coverage.xml
          flags: ai-service
          name: ai-service
          fail_ci_if_error: false
