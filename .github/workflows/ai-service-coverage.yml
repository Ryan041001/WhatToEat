name: AI Service CI

on:
  push:
    branches:
      - main
      - master
      - develop
      - feat/**
      - feature/**
      - fix/**
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ai-service-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: AI Service Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        run: pip install uv

      - name: Run ai-service tests with coverage
        working-directory: ai-service
        run: uv run --frozen --with pytest --with pytest-cov pytest --cov=app --cov-report=xml:coverage.xml --cov-report=term-missing -q

      - name: Upload ai-service coverage artifact
        if: ${{ !env.ACT && matrix.python-version == '3.12' }}
        uses: actions/upload-artifact@v4
        with:
          name: ai-service-coverage-python-${{ matrix.python-version }}
          path: ai-service/coverage.xml
          if-no-files-found: error

      - name: Upload ai-service coverage to Codecov
        if: ${{ !env.ACT && matrix.python-version == '3.12' }}
        uses: codecov/codecov-action@v6
        with:
          files: ai-service/coverage.xml
          flags: ai-service
          name: ai-service
          fail_ci_if_error: false
