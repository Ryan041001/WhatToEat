name: Backend CI

on:
  push:
    branches:
      - main
      - master
      - develop
      - feat/**
      - feature/**
      - fix/**
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  SPRING_PROFILES_ACTIVE: test
  AMAP_KEY: test-key
  AI_SERVICE_BASE_URL: http://localhost:8000
  AI_SERVICE_TIMEOUT_SECONDS: "1"
  WECHAT_AUTH_BASE_URL: https://api.weixin.qq.com

jobs:
  backend-test:
    name: Backend Test And Coverage (Java ${{ matrix.java-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        java-version: ["17"]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ matrix.java-version }}
          cache: maven

      - name: Run backend tests with JaCoCo
        working-directory: backend
        run: ./mvnw -B test jacoco:report

      - name: Upload backend coverage artifact
        if: ${{ !env.ACT }}
        uses: actions/upload-artifact@v4
        with:
          name: backend-jacoco-java-${{ matrix.java-version }}
          path: backend/target/site/jacoco/jacoco.xml
          if-no-files-found: error

      - name: Upload backend coverage to Codecov
        if: ${{ !env.ACT }}
        uses: codecov/codecov-action@v5
        with:
          files: backend/target/site/jacoco/jacoco.xml
          flags: backend
          name: backend
          fail_ci_if_error: false

  backend-lint:
    name: Backend Lint And Compile Check (Java ${{ matrix.java-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        java-version: ["17"]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ matrix.java-version }}
          cache: maven

      - name: Run Maven validation
        working-directory: backend
        run: ./mvnw -B -DskipTests validate

      - name: Compile backend sources
        working-directory: backend
        run: ./mvnw -B -DskipTests compile

  backend-package:
    name: Backend Package (Java ${{ matrix.java-version }})
    runs-on: ubuntu-latest
    needs:
      - backend-test
      - backend-lint
    strategy:
      fail-fast: false
      matrix:
        java-version: ["17"]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ matrix.java-version }}
          cache: maven

      - name: Build backend package
        working-directory: backend
        run: ./mvnw -B -DskipTests package

      - name: Upload backend jar
        if: ${{ !env.ACT }}
        uses: actions/upload-artifact@v4
        with:
          name: backend-jar-java-${{ matrix.java-version }}
          path: backend/target/*.jar
          if-no-files-found: error

  docker-build:
    name: Backend Docker Build Check
    runs-on: ubuntu-latest
    needs: backend-package
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Validate compose file
        run: docker compose config

      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: backend
          push: false
          tags: whattoeat-backend:ci
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend
