spring:
  datasource:
    url: jdbc:mysql://localhost:3306/whattoeat_dev?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai&characterEncoding=utf8
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always

amap:
  key: YOUR_AMAP_KEY_HERE
  base-url: https://restapi.amap.com
  timeout-seconds: 5

wechat:
  auth:
    app-id: ${WECHAT_APP_ID:}
    app-secret: ${WECHAT_APP_SECRET:}
    base-url: ${WECHAT_AUTH_BASE_URL:https://api.weixin.qq.com}
    mock-login-enabled: true
