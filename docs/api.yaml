openapi: 3.0.3
info:
  title: WhatToEat API
  version: 1.0.0
  description: |
    今天吃什么（WhatToEat）后端 API 文档。

    本文档覆盖当前已经实现的资源：认证、餐厅查询、推荐接口、黑名单新增。
servers:
  - url: http://localhost:8080
    description: Local development
tags:
  - name: Auth
    description: 认证与会话
  - name: Restaurants
    description: 餐厅查询
  - name: Recommendations
    description: 餐厅推荐
  - name: Blacklist
    description: 用户黑名单新增
paths:
  /api/v1/auth/wechat-login:
    post:
      tags: [Auth]
      summary: 微信登录（mock）
      operationId: wechatLogin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WechatLoginRequest'
      responses:
        '201':
          description: 登录成功并创建会话
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/LoginResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
  /api/v1/auth/logout:
    post:
      tags: [Auth]
      summary: 登出
      operationId: logout
      security:
        - bearerAuth: []
      responses:
        '200':
          description: 登出成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /api/v1/auth/me:
    get:
      tags: [Auth]
      summary: 获取当前登录用户
      operationId: me
      security:
        - bearerAuth: []
      responses:
        '200':
          description: 获取成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/UserInfo'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /api/v1/restaurants/nearby:
    get:
      tags: [Restaurants]
      summary: 查询附近餐厅
      operationId: getNearbyRestaurants
      parameters:
        - $ref: '#/components/parameters/Longitude'
        - $ref: '#/components/parameters/Latitude'
        - $ref: '#/components/parameters/Radius'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Size'
      responses:
        '200':
          description: 查询成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/RestaurantPageResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '502':
          $ref: '#/components/responses/AmapUpstreamError'
        '504':
          $ref: '#/components/responses/AmapUpstreamTimeout'
  /api/v1/restaurants/search:
    get:
      tags: [Restaurants]
      summary: 按关键词搜索餐厅
      operationId: searchRestaurants
      parameters:
        - name: keyword
          in: query
          required: true
          schema:
            type: string
          description: 搜索关键词
        - $ref: '#/components/parameters/Longitude'
        - $ref: '#/components/parameters/Latitude'
        - $ref: '#/components/parameters/Radius'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Size'
      responses:
        '200':
          description: 查询成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/RestaurantPageResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '502':
          $ref: '#/components/responses/AmapUpstreamError'
        '504':
          $ref: '#/components/responses/AmapUpstreamTimeout'
  /api/v1/recommendations/random:
    get:
      tags: [Recommendations]
      summary: 获取随机推荐餐厅
      operationId: getRandomRecommendation
      description: 先按页拉取并过滤候选餐厅，补足最多 20 条可用候选后再随机返回一条结果。
      parameters:
        - $ref: '#/components/parameters/OptionalUserId'
        - $ref: '#/components/parameters/Longitude'
        - $ref: '#/components/parameters/Latitude'
        - $ref: '#/components/parameters/Radius'
      responses:
        '200':
          description: 推荐成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/RecommendationResult'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '502':
          $ref: '#/components/responses/AmapUpstreamError'
        '504':
          $ref: '#/components/responses/AmapUpstreamTimeout'
  /api/v1/recommendations/cards:
    get:
      tags: [Recommendations]
      summary: 获取推荐卡片候选列表
      operationId: getRecommendationCards
      description: 按页继续拉取并过滤候选餐厅，直到收集满请求 size 或上游结果耗尽。
      parameters:
        - $ref: '#/components/parameters/OptionalUserId'
        - $ref: '#/components/parameters/Longitude'
        - $ref: '#/components/parameters/Latitude'
        - $ref: '#/components/parameters/Radius'
        - $ref: '#/components/parameters/RecommendationSize'
      responses:
        '200':
          description: 获取成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/RecommendationCardList'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '502':
          $ref: '#/components/responses/AmapUpstreamError'
        '504':
          $ref: '#/components/responses/AmapUpstreamTimeout'
  /api/v1/users/{userId}/blacklist:
    post:
      tags: [Blacklist]
      summary: 加入黑名单
      operationId: createBlacklist
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/UserId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateBlacklistRequest'
      responses:
        '201':
          description: 创建成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          $ref: '#/components/responses/Conflict'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: Token
      description: "自定义 session token，通过 Authorization: Bearer <token> 传递，不是 JWT。"
  parameters:
    UserId:
      name: userId
      in: path
      required: true
      schema:
        type: integer
        format: int64
    OptionalUserId:
      name: userId
      in: query
      required: false
      schema:
        type: integer
        format: int64
        minimum: 1
      description: 可选；传入后会按该用户黑名单过滤结果。必须为正整数且对应用户必须存在。
    Longitude:
      name: longitude
      in: query
      required: true
      schema:
        type: number
        format: double
    Latitude:
      name: latitude
      in: query
      required: true
      schema:
        type: number
        format: double
    Radius:
      name: radius
      in: query
      required: false
      schema:
        type: integer
        default: 1000
        minimum: 100
        maximum: 50000
    Page:
      name: page
      in: query
      required: false
      schema:
        type: integer
        default: 1
        minimum: 1
    Size:
      name: size
      in: query
      required: false
      schema:
        type: integer
        default: 10
        minimum: 1
        maximum: 100
    RecommendationSize:
      name: size
      in: query
      required: false
      schema:
        type: integer
        default: 20
        minimum: 1
        maximum: 100
  responses:
    BadRequest:
      description: 参数错误
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            validationFailed:
              value:
                code: 1001
                message: 参数校验失败
                data: null
    Unauthorized:
      description: 未登录或 token 无效
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            unauthorized:
              value:
                code: 1003
                message: 未登录或token无效
                data: null
    NotFound:
      description: 资源不存在
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Conflict:
      description: 资源冲突
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    AmapUpstreamError:
      description: 高德上游失败
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            amapError:
              value:
                code: 3001
                message: 高德上游失败
                data: null
    AmapUpstreamTimeout:
      description: 高德上游超时
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            amapTimeout:
              value:
                code: 3002
                message: 高德上游超时
                data: null
  schemas:
    ApiResponse:
      type: object
      properties:
        code:
          type: integer
          example: 0
        message:
          type: string
          example: success
        data:
          nullable: true
      required: [code, message, data]
    ErrorResponse:
      type: object
      properties:
        code:
          type: integer
        message:
          type: string
        data:
          type: object
          nullable: true
          example: null
      required: [code, message, data]
    WechatLoginRequest:
      type: object
      properties:
        code:
          type: string
          example: mock-code-001
        nickname:
          type: string
          example: Alice
      required: [code]
    LoginResponse:
      type: object
      properties:
        token:
          type: string
          example: 8f2c5f7314d649d3a9124f1930c68dfd
        user:
          $ref: '#/components/schemas/UserInfo'
      required: [token, user]
    UserInfo:
      type: object
      properties:
        id:
          type: integer
          format: int64
          example: 1
        openid:
          type: string
          example: mock-openid-mock-code-001
        nickname:
          type: string
          example: Alice
      required: [id, openid]
    RestaurantItem:
      type: object
      properties:
        poiId:
          type: string
          example: B0FF123456
        name:
          type: string
          example: 沙县小吃
        address:
          type: string
          example: 学林街xx号
        longitude:
          type: number
          format: double
          example: 120.3502
        latitude:
          type: number
          format: double
          example: 30.3154
        category:
          type: string
          example: 餐饮服务;中餐厅;快餐厅
        distance:
          type: number
          format: double
          example: 180
      required: [poiId, name, address, longitude, latitude, category, distance]
    RecommendationResult:
      allOf:
        - $ref: '#/components/schemas/RestaurantItem'
        - type: object
          properties:
            reason:
              type: string
              example: 符合筛选条件的随机结果
          required: [reason]
    RecommendationCardList:
      type: array
      items:
        $ref: '#/components/schemas/RestaurantItem'
    CreateBlacklistRequest:
      type: object
      properties:
        poiId:
          type: string
          maxLength: 64
          example: B0FF123456
      required: [poiId]
    RestaurantPageResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/RestaurantItem'
        page:
          type: integer
          example: 1
        size:
          type: integer
          example: 10
        total:
          type: integer
          example: 35
      required: [items, page, size, total]
